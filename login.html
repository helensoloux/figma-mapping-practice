<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Envestnet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@700&family=Red+Hat+Text:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens — Tier 2 Light mode ──────────────────────── */
    :root {
      /* Utility */
      --action:            #0074BD;
      --error-warning:     #D91014;

      /* Text */
      --default:           rgba(0, 0, 0, 0.85);
      --subtle-and-hint:   rgba(0, 0, 0, 0.55);
      --disabled:          rgba(0, 0, 0, 0.25);
      --primary-on-action: #FFFFFF;

      /* Neutral */
      --input-divider:     rgba(0, 0, 0, 0.42);
      --divider:           rgba(0, 0, 0, 0.15);
      --bg-0:              #FFFFFF;
      --bg-1:              #FAFAFA;
      --bg-2:              #F5F5F5;

      /* Typography */
      --font-family-header:    "Red Hat Display", sans-serif;
      --font-family-body:      "Red Hat Text", sans-serif;
      --font-size-header-2:    28px;
      --font-size-header-3:    20px;
      --font-size-header-5:    14px;
      --font-size-paragraph-1: 16px;
      --font-size-paragraph-2: 14px;
      --font-size-caption:     12px;

      /* Corner radius (Corner-radius/ tokens) */
      --corner-radius-small:  6px;
      --corner-radius-medium: 12px;

      /* Spacing (Numbers/ scale) */
      --space-4:  4px;
      --space-8:  8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --space-40: 40px;
    }

    /* ─── Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Page ────────────────────────────────────────────────────── */
    body {
      font-family:     var(--font-family-body);
      color:           var(--default);
      background:      var(--bg-2);
      min-height:      100vh;
      display:         flex;
      align-items:     center;
      justify-content: center;
      padding:         var(--space-24);
    }

    /* ─── Card ────────────────────────────────────────────────────── */
    .card {
      background:    var(--bg-0);
      border-radius: var(--corner-radius-medium);
      box-shadow:    0 2px 8px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.06);
      padding:       var(--space-40);
      width:         100%;
      max-width:     480px;
    }

    /* ─── Logo ────────────────────────────────────────────────────── */
    .logo {
      display:       flex;
      align-items:   center;
      gap:           var(--space-8);
      margin-bottom: var(--space-32);
    }

    .logo-mark {
      width:           40px;
      height:          40px;
      background:      var(--action);
      border-radius:   var(--corner-radius-small);
      display:         flex;
      align-items:     center;
      justify-content: center;
      flex-shrink:     0;
    }

    .logo-name {
      font-family: var(--font-family-header);
      font-size:   var(--font-size-paragraph-1);
      font-weight: 700;
      color:       var(--default);
    }

    /* ─── Form header ─────────────────────────────────────────────── */
    .form-header { margin-bottom: var(--space-32); }

    .form-title {
      font-family:   var(--font-family-header);
      font-size:     var(--font-size-header-2);
      font-weight:   700;
      color:         var(--default);
      margin-bottom: var(--space-8);
    }

    .form-subtitle {
      font-family: var(--font-family-body);
      font-size:   var(--font-size-paragraph-1);
      color:       var(--subtle-and-hint);
    }

    /* ─── Form ────────────────────────────────────────────────────── */
    .form {
      display:        flex;
      flex-direction: column;
      gap:            var(--space-20);
    }

    /* ─── Field ───────────────────────────────────────────────────── */
    .field {
      display:        flex;
      flex-direction: column;
      gap:            var(--space-4);
    }

    .field-label {
      font-family: var(--font-family-header);
      font-size:   var(--font-size-header-5);
      font-weight: 700;
      color:       var(--default);
    }

    /* ─── Text input ─────────────────────────────────────────────── */
    .input {
      font-family:        var(--font-family-body);
      font-size:          var(--font-size-paragraph-2);
      color:              var(--default);
      background:         var(--bg-0);
      border:             1px solid var(--input-divider);
      border-radius:      var(--corner-radius-small);
      height:             36px;
      padding:            10px 12px;
      width:              100%;
      outline:            none;
      -webkit-appearance: none;
    }
    .input::placeholder { color: var(--subtle-and-hint); }
    .input:hover  { border-color: var(--action); }
    .input:focus  { box-shadow: 0 0 0 2px var(--bg-0), 0 0 0 4px var(--action); }

    /* ─── Dropdown (dropdown.tsx) ────────────────────────────────── */
    .dropdown-input { position: relative; }

    .dropdown-input select {
      font-family:        var(--font-family-body);
      font-size:          var(--font-size-paragraph-2);
      color:              var(--default);
      background:         var(--bg-0);
      border:             1px solid var(--input-divider);
      border-radius:      var(--corner-radius-small);
      height:             36px;
      padding:            10px 36px 10px 12px;
      width:              100%;
      appearance:         none;
      -webkit-appearance: none;
      cursor:             pointer;
      outline:            none;
    }
    .dropdown-input select:hover { border-color: var(--action); }
    .dropdown-input select:focus { box-shadow: 0 0 0 2px var(--bg-0), 0 0 0 4px var(--action); }

    .dropdown-arrow {
      position:       absolute;
      right:          10px;
      top:            50%;
      transform:      translateY(-50%);
      pointer-events: none;
      display:        flex;
      align-items:    center;
    }

    /* ─── Checkbox row ───────────────────────────────────────────── */
    .checkbox-row {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
    }

    /* Checkbox (checkbox.tsx) */
    .checkbox-label {
      display:     flex;
      align-items: center;
      gap:         var(--space-8);
      font-family: var(--font-family-body);
      font-size:   var(--font-size-paragraph-2);
      color:       var(--default);
      cursor:      pointer;
    }
    .checkbox-label input[type="checkbox"] {
      accent-color: var(--action);
      width:        16px;
      height:       16px;
      cursor:       pointer;
      flex-shrink:  0;
    }

    .forgot-btn {
      font-family:     var(--font-family-body);
      font-size:       var(--font-size-paragraph-2);
      color:           var(--action);
      background:      none;
      border:          none;
      padding:         0;
      cursor:          pointer;
      text-decoration: none;
    }
    .forgot-btn:hover { text-decoration: underline; }

    /* ─── Divider ─────────────────────────────────────────────────── */
    .divider {
      height:     1px;
      background: var(--divider);
    }

    /* ─── Button (button.tsx) ────────────────────────────────────── */
    .btn {
      display:         flex;
      align-items:     center;
      justify-content: center;
      height:          42px;
      padding:         12px 24px;
      border-radius:   var(--corner-radius-medium);
      font-family:     var(--font-family-body);
      font-size:       var(--font-size-paragraph-1);
      font-weight:     500;
      cursor:          pointer;
      border:          none;
      width:           100%;
    }
    .btn-primary {
      background: var(--action);
      color:      var(--primary-on-action);
    }
    .btn-primary:hover { background: #006EB4; }

    .btn-secondary {
      background: transparent;
      color:      var(--action);
      border:     2px solid var(--action);
    }
    .btn-secondary:hover { background: rgba(0, 116, 189, 0.05); }

    /* ─── Footer ─────────────────────────────────────────────────── */
    .form-footer {
      text-align:  center;
      font-family: var(--font-family-body);
      font-size:   var(--font-size-caption);
      color:       var(--subtle-and-hint);
      margin-top:  var(--space-24);
    }
    .form-footer a { color: var(--action); text-decoration: none; }
    .form-footer a:hover { text-decoration: underline; }

    /* ─── Modal (modal.tsx — fixed overlay) ─────────────────────── */
    .modal-backdrop {
      position:        fixed;
      inset:           0;
      background:      rgba(0, 0, 0, 0.20);
      display:         flex;
      align-items:     center;
      justify-content: center;
      padding:         var(--space-24);
      z-index:         100;
      opacity:         0;
      pointer-events:  none;
      transition:      opacity 0.18s ease;
    }
    .modal-backdrop.open {
      opacity:        1;
      pointer-events: all;
    }

    .modal-card {
      background:    var(--bg-0);
      border-radius: var(--corner-radius-medium);
      box-shadow:    0 4px 24px rgba(0, 0, 0, 0.16);
      padding:       var(--space-32);
      width:         100%;
      max-width:     440px;
      transform:     translateY(6px);
      transition:    transform 0.18s ease;
    }
    .modal-backdrop.open .modal-card { transform: translateY(0); }

    .modal-title {
      font-family:   var(--font-family-header);
      font-size:     var(--font-size-header-3);
      font-weight:   700;
      color:         var(--default);
      margin-bottom: var(--space-8);
    }

    .modal-desc {
      font-family:   var(--font-family-body);
      font-size:     var(--font-size-paragraph-1);
      color:         var(--subtle-and-hint);
      line-height:   1.5;
      margin-bottom: var(--space-24);
    }

    .modal-body   { margin-bottom: var(--space-24); }

    .modal-actions {
      display:         flex;
      gap:             var(--space-12);
      justify-content: flex-end;
    }

    .modal-btn {
      height:        36px;
      padding:       0 var(--space-24);
      border-radius: var(--corner-radius-medium);
      font-family:   var(--font-family-body);
      font-size:     var(--font-size-paragraph-2);
      font-weight:   500;
      cursor:        pointer;
      border:        none;
    }
    .modal-btn-primary   { background: var(--action); color: var(--primary-on-action); }
    .modal-btn-primary:hover { background: #006EB4; }
    .modal-btn-secondary { background: transparent; color: var(--action); border: 2px solid var(--action); }
    .modal-btn-secondary:hover { background: rgba(0, 116, 189, 0.05); }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
          <path d="M3 11h16M11 3v16M5.5 5.5l11 11M16.5 5.5l-11 11" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-name">Envestnet</span>
    </div>

    <!-- Header -->
    <div class="form-header">
      <h1 class="form-title">Sign In</h1>
      <p class="form-subtitle">Access your Envestnet account</p>
    </div>

    <!-- Form -->
    <form class="form" onsubmit="return false;">

      <!-- Dropdown component -->
      <div class="field">
        <label class="field-label" for="institution">Institution</label>
        <div class="dropdown-input">
          <select id="institution">
            <option value="">Select your institution…</option>
            <option value="envestnet">Envestnet</option>
            <option value="tamarac">Tamarac</option>
            <option value="yodlee">Yodlee</option>
            <option value="redi2">Redi2</option>
          </select>
          <span class="dropdown-arrow">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M4 6L8 10L12 6" stroke="rgba(0,0,0,0.55)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Username -->
      <div class="field">
        <label class="field-label" for="username">Username</label>
        <input class="input" type="text" id="username" placeholder="Enter your username" autocomplete="username" />
      </div>

      <!-- Password -->
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <input class="input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      <!-- Checkbox component + forgot link -->
      <div class="checkbox-row">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" />
          Remember me
        </label>
        <button type="button" class="forgot-btn" onclick="openModal()">Forgot password?</button>
      </div>

      <div class="divider"></div>

      <!-- Button component — primary -->
      <button type="submit" class="btn btn-primary">Sign In</button>

    </form>

    <div class="form-footer">
      By signing in you agree to our
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </div>

  </div>

  <!-- Modal component — Forgot password -->
  <div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <h2 class="modal-title" id="modal-title">Reset Password</h2>
      <p class="modal-desc">
        Enter your email address and we'll send you a link to reset your password.
      </p>
      <div class="modal-body">
        <div class="field">
          <label class="field-label" for="reset-email">Email address</label>
          <input class="input" type="email" id="reset-email" placeholder="you@example.com" />
        </div>
      </div>
      <div class="modal-actions">
        <!-- Button component — secondary -->
        <button type="button" class="modal-btn modal-btn-secondary" onclick="closeModal()">Cancel</button>
        <!-- Button component — primary -->
        <button type="button" class="modal-btn modal-btn-primary">Send Reset Link</button>
      </div>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('modal').classList.add('open');
      document.getElementById('reset-email').focus();
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }
    document.getElementById('modal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>

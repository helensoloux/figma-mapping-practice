<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Envestnet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@700&family=Red+Hat+Text:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />

  <style>
    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page ──────────────────────────────────────────────────── */
    body {
      font-family:     var(--font-family-body);
      font-size:       var(--font-size-paragraph-2);
      color:           var(--default);
      background:      var(--bg-2);
      min-height:      100vh;
      display:         flex;
      align-items:     center;
      justify-content: center;
      padding:         var(--space-24);
    }

    /* ── Login card ────────────────────────────────────────────── */
    .card {
      background:    var(--bg-0);
      border-radius: var(--corner-radius-medium);
      box-shadow:    var(--shadow-regular),
                     0 var(--space-8) var(--space-24) rgba(0, 0, 0, 0.06);
      padding:       var(--space-40);
      width:         100%;
      max-width:     480px;
    }

    /* ── Logo ──────────────────────────────────────────────────── */
    .logo {
      display:       flex;
      align-items:   center;
      gap:           var(--space-8);
      margin-bottom: var(--space-32);
    }

    .logo-mark {
      width:           var(--space-40);
      height:          var(--space-40);
      background:      var(--action);
      border-radius:   var(--corner-radius-small);
      display:         flex;
      align-items:     center;
      justify-content: center;
      flex-shrink:     0;
    }

    .logo-name {
      font-family: var(--font-family-header);
      font-size:   var(--font-size-paragraph-1);
      font-weight: 700;
      color:       var(--default);
    }

    /* ── Page header ───────────────────────────────────────────── */
    .page-header { margin-bottom: var(--space-32); }

    .page-title {
      font-family:   var(--font-family-header);
      font-size:     var(--font-size-header-2);
      font-weight:   700;
      color:         var(--default);
      margin-bottom: var(--space-8);
    }

    .page-subtitle {
      font-family: var(--font-family-body);
      font-size:   var(--font-size-paragraph-1);
      color:       var(--subtle-and-hint);
    }

    /* ── Form layout ───────────────────────────────────────────── */
    .form {
      display:        flex;
      flex-direction: column;
      gap:            var(--space-20);
    }

    /* ── Field (shared by all inputs + dropdown) ───────────────── */
    .field {
      display:        flex;
      flex-direction: column;
      gap:            var(--space-4);
    }

    /*
     * Field label — Header 5 per design system:
     * Red Hat Display, 14px, 700, rgba(0,0,0,0.85)
     * (mirrors dropdown.tsx label implementation)
     */
    .field-label {
      font-family: var(--font-family-header);
      font-size:   var(--font-size-header-5);
      font-weight: 700;
      color:       var(--default);
    }

    /*
     * Text input — follows the same border/radius/height spec as
     * dropdown.tsx: 1px solid input-divider, Corner-radius/Small,
     * height 36px (--space-36).
     */
    .input {
      font-family:        var(--font-family-body);
      font-size:          var(--font-size-paragraph-2);
      color:              var(--default);
      background:         var(--bg-0);
      border:             1px solid var(--input-divider);
      border-radius:      var(--corner-radius-small);
      height:             var(--space-36);
      padding:            var(--space-8) var(--space-12);
      width:              100%;
      outline:            none;
      -webkit-appearance: none;
    }
    .input::placeholder { color: var(--subtle-and-hint); }
    .input:hover        { border-color: var(--action); }
    .input:focus        { box-shadow: var(--shadow-focus); }

    /*
     * Dropdown — mirrors dropdown.tsx exactly:
     * appearance:none, SVG chevron at right 10px,
     * padding 10px 36px 10px 12px (right clears the arrow),
     * 1px solid input-divider, Corner-radius/Small, height 36px.
     */
    .dropdown-wrap { position: relative; }

    .dropdown-wrap select {
      font-family:        var(--font-family-body);
      font-size:          var(--font-size-paragraph-2);
      color:              var(--default);
      background:         var(--bg-0);
      border:             1px solid var(--input-divider);
      border-radius:      var(--corner-radius-small);
      height:             var(--space-36);
      padding:            10px var(--space-36) 10px var(--space-12);
      width:              100%;
      appearance:         none;
      -webkit-appearance: none;
      cursor:             pointer;
      outline:            none;
    }
    .dropdown-wrap select:hover { border-color: var(--action); }
    .dropdown-wrap select:focus { box-shadow: var(--shadow-focus); }

    .dropdown-arrow {
      position:       absolute;
      right:          var(--space-8);
      top:            50%;
      transform:      translateY(-50%);
      pointer-events: none;
      display:        flex;
      align-items:    center;
    }

    /* ── Checkbox + forgot-password row ────────────────────────── */
    .checkbox-row {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
    }

    /*
     * Checkbox — mirrors checkbox.tsx:
     * flex + gap-8, accent-color: --action, 16×16px input,
     * Paragraph 2 / body font.
     */
    .checkbox-label {
      display:     flex;
      align-items: center;
      gap:         var(--space-8);
      font-family: var(--font-family-body);
      font-size:   var(--font-size-paragraph-2);
      color:       var(--default);
      cursor:      pointer;
    }
    .checkbox-label input[type="checkbox"] {
      accent-color: var(--action);
      width:        var(--space-16);
      height:       var(--space-16);
      cursor:       pointer;
      flex-shrink:  0;
    }

    .forgot-btn {
      font-family:     var(--font-family-body);
      font-size:       var(--font-size-paragraph-2);
      color:           var(--text-link);
      background:      none;
      border:          none;
      padding:         var(--space-0);
      cursor:          pointer;
      text-decoration: none;
    }
    .forgot-btn:hover { color: var(--text-link-hover); text-decoration: underline; }

    /* ── Divider ───────────────────────────────────────────────── */
    .divider {
      height:     1px;
      background: var(--divider);
    }

    /*
     * Button — mirrors button.tsx:
     * padding 12px 24px, Corner-radius/Small (6px) per Figma spec
     * (button.tsx uses --corner-radius-medium but Figma token
     * --button = 6, matching Corner-radius/Small).
     * Primary: --action bg, --primary-on-action text.
     * Secondary: transparent bg, 2px solid --action border.
     */
    .btn {
      display:         flex;
      align-items:     center;
      justify-content: center;
      padding:         var(--space-12) var(--space-24);
      border-radius:   var(--corner-radius-small);
      font-family:     var(--font-family-body);
      font-size:       var(--font-size-paragraph-1);
      font-weight:     500;
      border:          none;
      cursor:          pointer;
      width:           100%;
    }

    .btn-primary {
      background: var(--action);
      color:      var(--primary-on-action);
    }
    .btn-primary:hover  { background: var(--action-dark-5); }
    .btn-primary:focus  { outline: none; box-shadow: var(--shadow-focus); }

    .btn-secondary {
      background: transparent;
      color:      var(--action);
      border:     2px solid var(--action);
    }
    .btn-secondary:hover { background: var(--action-5); }
    .btn-secondary:focus { outline: none; box-shadow: var(--shadow-focus); }

    /* ── Form footer ───────────────────────────────────────────── */
    .form-footer {
      text-align:  center;
      font-family: var(--font-family-body);
      font-size:   var(--font-size-caption);
      color:       var(--subtle-and-hint);
      margin-top:  var(--space-24);
    }
    .form-footer a               { color: var(--text-link); text-decoration: none; }
    .form-footer a:hover         { color: var(--text-link-hover); text-decoration: underline; }

    /*
     * Modal — mirrors modal.tsx:
     * Fixed overlay with --overlay backdrop, bg-0 card,
     * Corner-radius/Medium (12px), --shadow-subtle.
     * title/description/primaryLabel/secondaryLabel props.
     */
    .modal-overlay {
      position:        fixed;
      inset:           var(--space-0);
      background:      var(--overlay);
      display:         flex;
      align-items:     center;
      justify-content: center;
      padding:         var(--space-24);
      z-index:         100;
      opacity:         0;
      pointer-events:  none;
      transition:      opacity 0.18s ease;
    }
    .modal-overlay.open {
      opacity:        1;
      pointer-events: all;
    }

    .modal-card {
      background:    var(--bg-0);
      border-radius: var(--corner-radius-medium);
      box-shadow:    var(--shadow-subtle);
      padding:       var(--space-32);
      width:         100%;
      max-width:     440px;
      transform:     translateY(var(--space-6));
      transition:    transform 0.18s ease;
    }
    .modal-overlay.open .modal-card { transform: translateY(var(--space-0)); }

    .modal-title {
      font-family:   var(--font-family-header);
      font-size:     var(--font-size-header-3);
      font-weight:   700;
      color:         var(--default);
      margin-bottom: var(--space-8);
    }

    .modal-description {
      font-family:   var(--font-family-body);
      font-size:     var(--font-size-paragraph-1);
      color:         var(--subtle-and-hint);
      line-height:   1.5;
      margin-bottom: var(--space-24);
    }

    .modal-body   { margin-bottom: var(--space-24); }

    .modal-actions {
      display:         flex;
      gap:             var(--space-12);
      justify-content: flex-end;
    }

    /* Modal buttons — same token rules as .btn, no full-width */
    .modal-btn {
      display:       inline-flex;
      align-items:   center;
      padding:       var(--space-8) var(--space-24);
      height:        var(--space-36);
      border-radius: var(--corner-radius-small);
      font-family:   var(--font-family-body);
      font-size:     var(--font-size-paragraph-2);
      font-weight:   500;
      border:        none;
      cursor:        pointer;
    }
    .modal-btn-primary            { background: var(--action); color: var(--primary-on-action); }
    .modal-btn-primary:hover      { background: var(--action-dark-5); }
    .modal-btn-secondary          { background: transparent; color: var(--action); border: 2px solid var(--action); }
    .modal-btn-secondary:hover    { background: var(--action-5); }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M4 11h14M11 4v14M6 6l10 10M16 6L6 16"
                stroke="white" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-name">Envestnet</span>
    </div>

    <!-- Header — Header 2 + Paragraph 1 -->
    <div class="page-header">
      <h1 class="page-title">Sign In</h1>
      <p class="page-subtitle">Access your Envestnet account</p>
    </div>

    <form class="form" onsubmit="return false;">

      <!-- Dropdown component -->
      <div class="field">
        <label class="field-label" for="institution">Institution</label>
        <div class="dropdown-wrap">
          <select id="institution">
            <option value="">Select your institution…</option>
            <option value="envestnet">Envestnet</option>
            <option value="tamarac">Tamarac</option>
            <option value="yodlee">Yodlee</option>
            <option value="redi2">Redi2</option>
          </select>
          <span class="dropdown-arrow" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 6L8 10L12 6"
                    stroke="rgba(0,0,0,0.55)"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Text input: Username -->
      <div class="field">
        <label class="field-label" for="username">Username</label>
        <input class="input" type="text" id="username"
               placeholder="Enter your username"
               autocomplete="username" />
      </div>

      <!-- Text input: Password -->
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <input class="input" type="password" id="password"
               placeholder="Enter your password"
               autocomplete="current-password" />
      </div>

      <!-- Checkbox component + forgot link -->
      <div class="checkbox-row">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" />
          Remember me
        </label>
        <button type="button" class="forgot-btn" onclick="openModal()">
          Forgot password?
        </button>
      </div>

      <div class="divider"></div>

      <!-- Button component — primary, full width -->
      <button type="submit" class="btn btn-primary">Sign In</button>

    </form>

    <!-- Caption / footer -->
    <p class="form-footer">
      By signing in you agree to our
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </p>

  </div>

  <!-- Modal component — Forgot password
       Props: title, description, primaryLabel="Send Reset Link",
              secondaryLabel="Cancel", onClose, onPrimary, onSecondary -->
  <div class="modal-overlay" id="modal"
       role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">

      <h2 class="modal-title" id="modal-title">Reset Password</h2>
      <p class="modal-description">
        Enter your email address and we'll send you a link to reset your password.
      </p>

      <div class="modal-body">
        <div class="field">
          <label class="field-label" for="reset-email">Email address</label>
          <input class="input" type="email" id="reset-email"
                 placeholder="you@example.com" />
        </div>
      </div>

      <div class="modal-actions">
        <!-- secondaryLabel -->
        <button type="button" class="modal-btn modal-btn-secondary"
                onclick="closeModal()">Cancel</button>
        <!-- primaryLabel -->
        <button type="button" class="modal-btn modal-btn-primary">
          Send Reset Link
        </button>
      </div>

    </div>
  </div>

  <script>
    const modal = document.getElementById('modal');

    function openModal() {
      modal.classList.add('open');
      document.getElementById('reset-email').focus();
    }

    function closeModal() {
      modal.classList.remove('open');
    }

    // onClose: backdrop click
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    // onClose: Escape key
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>

</body>
</html>
